#ViewResolver
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

#Actuator
management.endpoints.web.exposure.include=env,info,shutdown,mappings,beans,health,metrics
#db
spring.datasource.url=${db_URL}
spring.datasource.name=${db_name}
spring.datasource.password=${db_password}
spring.datasource.driver-class-name=org.postgresql.Driver

#baseline-on-migrate=true
logging.level.root=INFO
logging.level.com.IH=DEBUG
logging.file.name=logs/logs.log

#hefwf
javax.validation.constraints.Size.message=must be between {min} and {max}
javax.validation.constraints.NotBlank.message=must not be blank
javax.validation.constraints.NotNull.message=must not be null
